<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Successful – MyApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #2d5a3d; --accent2: #4a8c62; --bg: #f5f0e8; --text: #1a1a1a; --muted: #7a7a7a; --border: #e0d8cc; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(45,90,61,0.08) 0%, transparent 55%),
        radial-gradient(circle at 80% 80%, rgba(74,140,98,0.10) 0%, transparent 55%);
      overflow: hidden;
    }

    .circle {
      position: fixed; border-radius: 50%; opacity: 0.15;
      animation: float linear infinite;
    }
    .circle:nth-child(1) { width:80px;  height:80px;  background:var(--accent);  top:10%; left:5%;    animation-duration:12s; }
    .circle:nth-child(2) { width:40px;  height:40px;  background:var(--accent2); top:70%; left:10%;   animation-duration:9s;  animation-delay:2s; }
    .circle:nth-child(3) { width:60px;  height:60px;  background:var(--accent);  top:20%; right:8%;   animation-duration:14s; animation-delay:1s; }
    .circle:nth-child(4) { width:100px; height:100px; background:var(--accent2); bottom:10%; right:5%; animation-duration:11s; animation-delay:3s; }
    .circle:nth-child(5) { width:30px;  height:30px;  background:var(--accent);  top:50%; left:50%;   animation-duration:8s;  animation-delay:0.5s; }

    @keyframes float {
      0%   { transform: translateY(0) rotate(0deg); }
      50%  { transform: translateY(-40px) rotate(180deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }

    .card {
      position: relative; z-index: 10;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 64px 72px;
      text-align: center;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 32px 80px rgba(45,90,61,0.14), 0 0 0 1px var(--border);
      animation: popIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.85) translateY(40px); }
      60%  { transform: scale(1.03) translateY(-4px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .check-wrap {
      width: 90px; height: 90px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 12px 36px rgba(45,90,61,0.30);
      animation: checkPop 0.6s cubic-bezier(0.22,1,0.36,1) 0.3s both;
    }

    @keyframes checkPop {
      from { transform: scale(0) rotate(-30deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    .check-wrap svg {
      width: 42px; height: 42px;
      stroke: #fff; stroke-width: 3;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
    }

    .check-wrap svg polyline {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: draw 0.5s ease-out 0.7s forwards;
    }

    @keyframes draw { to { stroke-dashoffset: 0; } }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px; font-weight: 700;
      color: var(--text); margin-bottom: 12px; line-height: 1.2;
    }

    .name-highlight { color: var(--accent); }

    .subtitle {
      font-size: 15px; color: var(--muted);
      font-weight: 300; line-height: 1.6; margin-bottom: 10px;
    }

    .email-badge {
      display: inline-block;
      background: #eaf6ee; border: 1px solid #b2dfca;
      color: var(--accent); font-size: 13px; font-weight: 500;
      padding: 6px 16px; border-radius: 999px; margin-bottom: 36px;
    }

    .divider { height: 1px; background: var(--border); margin: 0 0 28px; }

    .logout-btn {
      display: inline-block; padding: 13px 36px;
      background: var(--accent); color: #fff;
      font-family: 'Jost', sans-serif; font-size: 14px;
      font-weight: 500; letter-spacing: 1px;
      border-radius: 12px; text-decoration: none;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(45,90,61,0.25);
    }
    .logout-btn:hover  { background: var(--accent2); }
    .logout-btn:active { transform: scale(0.98); }
  </style>
</head>
<body>

  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="card">
    <div class="check-wrap">
      <svg viewBox="0 0 52 52">
        <polyline points="14,27 22,35 38,19"/>
      </svg>
    </div>

    <h1>Login <span class="name-highlight">Successful!</span></h1>

    <p class="subtitle">
      Welcome back, <strong>{{ first_name }} {{ last_name }}</strong>.<br/>
      You are now signed in to your account.
    </p>

    <span class="email-badge">&#9654;&nbsp; {{ email }}</span>

    <div class="divider"></div>

    <a href="/logout" class="logout-btn">&#8592;&nbsp; Sign Out</a>
  </div>

</body>
</html>
